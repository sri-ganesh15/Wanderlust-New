apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-backend
  template:
    metadata:
      labels:
        app: node-backend
    spec:
      containers:
        - name: node-backend
          image: sriganesh15/node-backend:${BUILD_NUMBER}
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"